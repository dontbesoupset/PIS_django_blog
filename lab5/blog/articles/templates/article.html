<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="{{ STATIC_URL}}css/article.css">
</head>
<body class="article">
    <div class="header">
        <img src="{{ STATIC_URL}}img/dpb-logo.png"/>  
        <a href="/" class="all-posts-link">Все записи</a>
    </div>
    
    <div class="article-content">
        <h1>{{ post.title }}</h1>
        <div class="article-info">
            <div class="article-author">{{ post.author.username }}</div>
            <div class="article-created-date">{{ post.created_date }}</div>
        </div>
        <p class="article-text">{{ post.text }}</p>
    </div>
</body>
</html>
