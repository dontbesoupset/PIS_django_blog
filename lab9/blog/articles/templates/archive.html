<!DOCTYPE html>
<html>
<head>
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{{ STATIC_URL}}css/article.css">
</head>
<body class="archive">
    <!-- Шапка с параллакс-эффектом -->
    <div class="header">
        <!-- Логотип по центру -->
        <div class="logo-center">
            <img class="logo" src="{{ STATIC_URL}}img/dpb-logo.png" alt="Логотип">
        </div>
        
        <!-- Строка: левая часть (ссылки + надпись) и правая часть (иконки) -->
        <div class="header-bottom-row">
            <div class="header-left">
                <div class="auth-links">
                    {% if user.is_authenticated %}
                        <span>Привет, {{ user.username }}!</span>
                        <a href="/admin/">Админка</a>
                    {% else %}
                        <a href="/login/">Вход</a>
                        <a href="/register/">Регистрация</a>
                    {% endif %}
                </div>
                <p class="service-title">Коллективный блог</p>
            </div>
            
            <div class="icons-for-parallax">
                <img class="icon-for-parallax-first" src="{{ STATIC_URL }}img/article-icon-for-parallax.png" alt="Иконка">
                <img class="icon-for-parallax-second" src="{{ STATIC_URL }}img/article-icon-for-parallax.png" alt="Иконка">
                <img class="icon-for-parallax-third" src="{{ STATIC_URL }}img/article-icon-for-parallax.png" alt="Иконка">
            </div>
        </div>
    </div>
    
    <!-- Основной контент -->
    <div class="archive-content">
        {% for post in posts %}
        <div class="one-post">
            <div class="post-managment">
                <h2 class="post-title">
                    <a href="/article/{{ post.id }}/">{{ post.title }}</a>
                </h2>
                <p class="fold-button">свернуть</p>
            </div>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.get_excerpt }}</p>
            <div class="one-post-shadow"></div>
        </div>
        {% endfor %}
    </div>
    
    <script src="{{ STATIC_URL}}js/jquery.js"></script>
    <script src="{{ STATIC_URL}}js/helloworld.js"></script>
    <script src="{{ STATIC_URL}}js/fold-post.js"></script>
    <script src="{{ STATIC_URL}}js/highlight-post.js"></script>
    <script src="{{ STATIC_URL}}js/parallax.js"></script>
</body>
</html>
