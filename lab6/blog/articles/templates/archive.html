<!DOCTYPE html>
<html>
<div class="header">
    <link rel="stylesheet" href="{{ STATIC_URL}}css/article.css">
    <div class="auth-links">
        {% if user.is_authenticated %}
            <span>Привет, {{ user.username }}!</span>
            <a href="/admin/">Админка</a>
        {% else %}
            <a href="/login/">Вход</a>
            <a href="/register/">Регистрация</a>
        {% endif %}
    </div>
</div>
<body class="archive">
    <div class="header">
        <img src="{{ STATIC_URL}}img/dpb-logo.png"/>
    </div>
    <div class="archive">
        {% for post in posts %}
        <div class="one-post">
            <h2 class="post-title">
                <a href="/article/{{ post.id }}/">{{ post.title }}</a>
            </h2>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.get_excerpt }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
